<!DOCTYPE html>
<html>
<head>
<title>Gmail Outreach Tool</title>

<style>

body{
background:#0f172a;
font-family:Arial;
color:white;
}

.box{
width:520px;
margin:auto;
margin-top:60px;
background:#1e293b;
padding:25px;
border-radius:10px;
box-shadow:0 0 15px rgba(0,0,0,0.6);
}

h2{
text-align:center;
}

input,textarea{
width:100%;
padding:10px;
margin-top:10px;
background:#020617;
border:1px solid #334155;
color:white;
border-radius:5px;
}

button{
margin-top:15px;
padding:12px;
width:100%;
background:#22c55e;
border:none;
border-radius:5px;
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#16a34a;
}

</style>

</head>

<body>

<div class="box">

<h2>Gmail Outreach Composer</h2>

<label>Email</label>
<input type="text" id="email" placeholder="example@gmail.com">

<label>Subject</label>
<input type="text" id="subject" value="Adsense Approved Website Sell">

<label>Message</label>

<textarea id="message" rows="12">

Hello Sir,

Kya aap apni ADSENSE APPROVED WEBSITE sell karna chahte hain?

Hum aapko website ke liye HIGH PRICE dilwa sakte hain. Agar aap interested hain to niche diye gaye link par details fill karein ya direct WhatsApp par contact karein.

Thanks & Regards
Prakash Raiya

📱 WhatsApp: 7017161590
🌐 https://prakashraiya.pages.dev/sell-adsense

</textarea>

<button onclick="sendMail()">Open Gmail Compose</button>

</div>

<script>

function sendMail(){

let email=document.getElementById("email").value;
let subject=encodeURIComponent(document.getElementById("subject").value);
let body=encodeURIComponent(document.getElementById("message").value);

let url="https://mail.google.com/mail/?view=cm&fs=1&to="+email+"&su="+subject+"&body="+body;

window.open(url,"_blank");

}

</script>

</body>
</html>
