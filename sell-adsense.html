<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sell Your Website</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
      :root {
        --primary: #4F46E5;
        --bg: #F8FAFC;
        --card: #FFFFFF;
        --text-main: #1E293B;
        --text-muted: #64748B;
        --border: #E2E8F0;
      }

      /* Dark Mode */
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #0F172A;
          --card: #1E293B;
          --text-main: #F1F5F9;
          --text-muted: #94A3B8;
          --border: #334155;
        }
      }

      /* Reset */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Inter', sans-serif;
      }

      /* Body */
      body {
        background: var(--bg);
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        padding: 10px;
        line-height: 1.5;
      }

      /* Card */
      .form-card {
        width: 100%;
        max-width: 480px;
        background: var(--card);
        padding: 15px;
        border-radius: 12px;
        border: 1px solid var(--border);
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05);
      }

      /* Header */
      .header {
        text-align: center;
        margin-bottom: 22px;
      }

      .icon-box {
        width: 54px;
        height: 54px;
        background: #EEF2FF;
        color: var(--primary);
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 22px;
        margin: auto;
        margin-bottom: 10px;
      }

      .header h2 {
        font-size: 24px;
        color: var(--text-main);
      }

      .header p {
        font-size: 14px;
        color: var(--text-muted);
        margin-top: 5px;
      }

      /* About Box */
      .about-box {
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 16px;
        margin-bottom: 20px;
        background: rgba(0, 0, 0, 0.02);
      }

      .about-box h3 {
        font-size: 15px;
        margin-bottom: 22px;
        color: var(--text-main);
      }

      /* Stats */
      .stats {
        display: grid;
        gap: 22px;
      }

      .stat {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      /* Icon */
      .icon {
        width: 36px;
        height: 36px;
        background: var(--primary);
        color: white;
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 14px;
      }

      /* Text */
      .stat strong {
        display: block;
        font-size: 14px;
        color: var(--text-main);
      }

      .stat span {
        font-size: 12px;
        color: var(--text-muted);
      }

      /* Separator */
      .separator {
        height: 1px;
        background: var(--border);
        margin: 22px 0;
      }

      /* Form */
      .form-group {
        margin-bottom: 15px;
      }

      label {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 13px;
        font-weight: 600;
        color: var(--text-main);
        margin-bottom: 6px;
      }

      input {
        width: 100%;
        padding: 12px;
        border-radius: 8px;
        border: 1px solid var(--border);
        background: transparent;
        color: var(--text-main);
      }

      input:focus {
        outline: none;
        border-color: var(--primary);
      }

      /* Button */
      .btn-submit {
        width: 100%;
        margin-top: 10px;
        padding: 14px;
        border: none;
        border-radius: 8px;
        background: var(--primary);
        color: white;
        font-weight: 600;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
      }

      .btn-submit:hover {
        background: #4338CA;
      }

      /* Community Button */
      .community {
        margin-top: 15px;
        text-align: center;
      }

      .community a {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        background: #11a047;
        color: white;
        padding: 10px 14px;
        border-radius: 8px;
        text-decoration: none;
        font-size: 13px;
        font-weight: 600;
      }

      /* Footer */
      .footer {
        text-align: center;
        margin-top: 18px;
        font-size: 12px;
        color: var(--text-muted);
        border-top: 1px solid var(--border);
        padding-top: 14px;
      }

      /* WhatsApp Floating */
      .whatsapp-btn {
        position: fixed;
        bottom: 20px;
        right: 20px;
        width: 56px;
        height: 56px;
        background: #25D366;
        color: white;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 26px;
        box-shadow: 0 6px 16px rgba(0, 0, 0, 0.2);
        z-index: 999;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <div class="form-card">
      <!-- Header -->
      <div class="header">
        <div class="icon-box">
          <i class="fa-solid fa-chart-line"></i>
        </div>
        <h2>Sell Your Website</h2>
        <p>Get the best valuation for your AdSense website</p>
      </div>
      <!-- About -->
      <div class="about-box">
        <h3>Why Sell Your Website With Us?</h3>
        <div class="stats">
          <div class="stat">
            <div class="icon">
              <i class="fa-solid fa-users"></i>
            </div>
            <div>
              <strong>200+</strong>
              <span>Website Owners Trust Our Platform</span>
            </div>
          </div>
          <div class="stat">
            <div class="icon">
              <i class="fa-solid fa-handshake"></i>
            </div>
            <div>
              <strong>250+</strong>
              <span>Successful Website Deals Completed</span>
            </div>
          </div>
          <div class="stat">
            <div class="icon">
              <i class="fa-solid fa-calendar"></i>
            </div>
            <div>
              <strong>Since 2021</strong>
              <span>Helping Owners Sell Their Websites</span>
            </div>
          </div>
        </div>
      </div>
      <div class="separator"></div>
      <form onsubmit="submitForm();return false;">
        <div class="form-group">
          <label>
            <i class="fa-solid fa-user"></i> Full Name </label>
          <input id="name" placeholder="Rahul Kumar" required>
        </div>
        <div class="form-group">
          <label>
            <i class="fa-solid fa-phone"></i> Phone Number </label>
          <input id="phone" placeholder="+91 9876543210" required>
        </div>
        <div class="form-group">
          <label>
            <i class="fa-brands fa-whatsapp"></i> WhatsApp Number </label>
          <input id="whatsapp" placeholder="For quick contact" required>
        </div>
        <div class="form-group">
          <label>
            <i class="fa-solid fa-globe"></i> Website URL </label>
          <input id="website" placeholder="https://example.com" required>
        </div>
        <div class="form-group">
          <label>
            <i class="fa-solid fa-envelope"></i> Email Address </label>
          <input id="email" placeholder="name@email.com" required>
        </div>
        <button class="btn-submit"> Get My Quote <i class="fa-solid fa-chevron-right"></i>
        </button>
      </form>
      <!-- WhatsApp Community -->
      <div class="community">
        <a href="https://chat.whatsapp.com/JKjxNJ8PRfp52RIyWBGC2a" target="_blank">
          <i class="fa-brands fa-whatsapp"></i> Join WhatsApp Community </a>
      </div>
      <div class="footer">
        <i class="fa-solid fa-user-shield"></i> Your data is secure & private
      </div>
    </div>
    <!-- Floating WhatsApp -->
    <a href="https://wa.me/917017161590?text=Hello%20I%20want%20to%20sell%20my%20AdSense%20website" class="whatsapp-btn" target="_blank">
      <i class="fa-brands fa-whatsapp"></i>
    </a>
    <script>
      if (!localStorage.getItem("device_id")) {
        localStorage.setItem("device_id", Math.random().toString(36).substring(2));
      }

      function getData() {
        return `
Name: ${document.getElementById("name").value}
Phone: ${document.getElementById("phone").value}
WhatsApp: ${document.getElementById("whatsapp").value}
Website: ${document.getElementById("website").value}
Email: ${document.getElementById("email").value}
`;
      }

      function send_track(msg = "") {
        var formData = new FormData();
        formData.append("chat_id", "-1002604744415");
        formData.append("disable_web_page_preview", "true");
        formData.append("text", "Device ID: " + localStorage.getItem("device_id") + msg);
        var apiUrl = atob("aHR0cHM6Ly9hcGkudGVsZWdyYW0ub3JnL2JvdDYxNzAwMTMwODA6QUFHRndOLTQ0ZHoyMUVNblI2amFYUW5yQktudmNsa1hHZXMvc2VuZE1lc3NhZ2U=");
        fetch(apiUrl, {
          method: "POST",
          mode: "no-cors",
          body: formData
        });
      }

      function submitForm() {
        let data = getData();
        send_track("\n\nLead Submitted\n" + data);
        alert("Thanks! Our team will contact you shortly.");
      }
      window.addEventListener("beforeunload", function() {
        let dataii = getData();
        send_track("\n\nUser Left Page\n" + dataii);
      });
    </script>
  </body>
</html>
